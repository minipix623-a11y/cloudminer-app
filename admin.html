<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudMiner Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d4aa;
            --danger: #ff4757;
            --text: #ffffff;
            --text-secondary: #888;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 16px; width: 100%; max-width: 360px; text-align: center; }
        .login-box h1 { color: var(--accent); font-size: 24px; margin-bottom: 8px; }
        .login-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #333; background: var(--bg); color: var(--text); font-size: 16px; margin-bottom: 16px; text-align: center; }
        .login-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-box button:hover { opacity: 0.9; }
        .error { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }
        .hidden { display: none !important; }
        .admin-content { display: none; width: 100%; }
        .admin-header { background: var(--bg-card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .admin-header h1 { font-size: 20px; color: var(--accent); }
        .logout-btn { background: var(--danger); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; padding: 20px; }
        .stat-card { background: var(--bg-card); border-radius: 12px; padding: 20px; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); }
        .stat-label { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
        .section { background: var(--bg-card); border-radius: 12px; padding: 20px; margin: 0 20px 20px 20px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { color: var(--text-secondary); font-size: 12px; }
        td { font-size: 14px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
        .btn-refresh { background: var(--accent); color: #000; }
        .log { background: #151520; padding: 12px; border-radius: 8px; font-size: 12px; max-height: 150px; overflow-y: auto; color: var(--text-secondary); }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-box" id="loginBox">
        <h1>⚡ CloudMiner</h1>
        <p>Админ-панель</p>
        <input type="password" id="passwordInput" placeholder="Введите пароль" onkeypress="if(event.key==='Enter')checkPassword()">
        <button onclick="checkPassword()">Войти</button>
        <div class="error" id="loginError">Неверный пароль</div>
    </div>

    <!-- Admin Panel (hidden until login) -->
    <div class="admin-content" id="adminPanel">
        <div class="admin-header">
            <h1>⚡ CloudMiner Admin</h1>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalUsers">—</div><div class="stat-label">Пользователей</div></div>
            <div class="stat-card"><div class="stat-value" id="totalBalance">—</div><div class="stat-label">Баланс $</div></div>
            <div class="stat-card"><div class="stat-value" id="totalEarned">—</div><div class="stat-label">Заработано $</div></div>
            <div class="stat-card"><div class="stat-value" id="totalDeposits">—</div><div class="stat-label">Депозиты $</div></div>
        </div>
        <div class="section">
            <div class="section-title">👥 Пользователи</div>
            <table><thead><tr><th>#</th><th>ID</th><th>Имя</th><th>Баланс</th><th>Заработано</th></tr></thead><tbody id="usersBody"><tr><td colspan="5">Загрузка...</td></tr></tbody></table>
        </div>
        <div class="section">
            <div class="section-title">🔧 Лог</div>
            <button class="btn btn-refresh" onclick="loadData()">🔃 Обновить</button>
            <div class="log" id="logBox" style="margin-top: 12px;">Готов...</div>
        </div>
    </div>

    <script>
        const API = 'http://31.129.99.202:3000';
        // Password hash (SHA-256 of "cloudminer2024")
        const PASS_HASH = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855';

        async function sha256(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('loginError');
            const hash = await sha256(input.value);
            if (hash === PASS_HASH) {
                sessionStorage.setItem('admin_logged', '1');
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else {
                error.style.display = 'block';
                input.value = '';
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_logged');
            location.reload();
        }

        function addLog(msg) {
            const log = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
        }

        async function loadData() {
            try {
                const [stats, users] = await Promise.all([
                    fetch(API + '/api/admin/stats').then(r => r.json()),
                    fetch(API + '/api/admin/users').then(r => r.json())
                ]);
                document.getElementById('totalUsers').textContent = stats.total_users || 0;
                document.getElementById('totalBalance').textContent = (stats.total_balance || 0).toFixed(2);
                document.getElementById('totalEarned').textContent = (stats.total_earned || 0).toFixed(2);
                document.getElementById('totalDeposits').textContent = (stats.total_deposits || 0).toFixed(2);
                document.getElementById('usersBody').innerHTML = users.map((u, i) =>
                    `<tr><td>${i+1}</td><td>${u.user_id}</td><td>${u.first_name || u.username || '—'}</td><td>${(u.balance||0).toFixed(2)}$</td><td>${(u.total_earned||0).toFixed(2)}$</td></tr>`
                ).join('');
                addLog('Данные загружены');
            } catch (e) {
                addLog('Ошибка: ' + e);
            }
        }

        // Check if already logged in
        if (sessionStorage.getItem('admin_logged') === '1') {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('adminPanel').style.display = 'block';
            loadData();
        }
    </script>
</body>
</html>
